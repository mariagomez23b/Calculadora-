<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Científica Multicolor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fondo diferente: Un degradado animado de tonos rojos, violetas y oscuros */
            background: linear-gradient(-45deg, #4a0000, #8b0000, #3a0007, #1a0003);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Animación para que el fondo cambie suavemente */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .calculator {
            background-color: rgba(20, 20, 20, 0.95);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 0 30px rgba(230, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            border: 2px solid #550000;
        }

        .display {
            width: 100%;
            height: 65px;
            background-color: #0f0f0f;
            border: 2px solid #333;
            border-radius: 12px;
            color: #00ffcc; /* Texto de pantalla estilo neón */
            font-size: 26px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            font-family: monospace;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        button {
            height: 55px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s, box-shadow 0.2s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        button:active {
            transform: scale(0.92);
        }

        button:hover {
            filter: brightness(1.3) saturate(1.2);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        /* COLORES EXCLUSIVOS PARA CADA CUADRO / BOTÓN */
        .btn-sin { background-color: #e91e63; } /* Rosa */
        .btn-cos { background-color: #9c27b0; } /* Morado */
        .btn-tan { background-color: #673ab7; } /* Violeta */
        .btn-c   { background-color: #ff1100; } /* Rojo Fuego */
        .btn-back{ background-color: #ff5722; } /* Naranja Oscuro */

        .btn-log { background-color: #3f51b5; } /* Indigo */
        .btn-sqrt{ background-color: #2196f3; } /* Azul */
        .btn-pi  { background-color: #03a9f4; } /* Celeste */
        .btn-pow { background-color: #00bcd4; } /* Cian */
        .btn-div { background-color: #009688; } /* Turquesa */

        .btn-7   { background-color: #4caf50; } /* Verde */
        .btn-8   { background-color: #8bc34a; } /* Verde Claro */
        .btn-9   { background-color: #cddc39; } /* Lima */
        .btn-par1{ background-color: #607d8b; } /* Gris Azulado */
        .btn-mult{ background-color: #ff9800; } /* Naranja */

        .btn-4   { background-color: #ffc107; } /* Amarillo */
        .btn-5   { background-color: #ffca28; } /* Ámbar */
        .btn-6   { background-color: #ffb300; } /* Oro */
        .btn-par2{ background-color: #78909c; } /* Gris Claro */
        .btn-rest{ background-color: #e64a19; } /* Bermellón */

        .btn-1   { background-color: #90a4ae; } /* Aluminio */
        .btn-2   { background-color: #b0bec5; } /* Platino */
        .btn-3   { background-color: #cfd8dc; color: #333; } /* Pastel */
        .btn-sum { background-color: #d84315; } /* Óxido */
        
        .btn-0   { background-color: #37474f; grid-column: span 2; } /* Pizarra */
        .btn-dot { background-color: #546e7a; } /* Arena */
        .btn-eq  { background-color: #00e676; color: #000; grid-column: span 2; } /* Verde Neón */

    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="screen" class="display" readonly placeholder="0">

    <div class="grid">
        <button class="btn-sin" onclick="press('Math.sin(')">sin</button>
        <button class="btn-cos" onclick="press('Math.cos(')">cos</button>
        <button class="btn-tan" onclick="press('Math.tan(')">tan</button>
        <button class="btn-c" onclick="clearScreen()">C</button>
        <button class="btn-back" onclick="backspace()">⌫</button>

        <button class="btn-log" onclick="press('Math.log10(')">log</button>
        <button class="btn-sqrt" onclick="press('Math.sqrt(')">√</button>
        <button class="btn-pi" onclick="press('Math.PI')">π</button>
        <button class="btn-pow" onclick="press('**')">^</button>
        <button class="btn-div" onclick="press('/')">/</button>

        <button class="btn-7" onclick="press('7')">7</button>
        <button class="btn-8" onclick="press('8')">8</button>
        <button class="btn-9" onclick="press('9')">9</button>
        <button class="btn-par1" onclick="press('(')">(</button>
        <button class="btn-mult" onclick="press('*')">*</button>

        <button class="btn-4" onclick="press('4')">4</button>
        <button class="btn-5" onclick="press('5')">5</button>
        <button class="btn-6" onclick="press('6')">6</button>
        <button class="btn-par2" onclick="press(')')">)</button>
        <button class="btn-rest" onclick="press('-')">-</button>

        <button class="btn-1" onclick="press('1')">1</button>
        <button class="btn-2" onclick="press('2')">2</button>
        <button class="btn-3" onclick="press('3')">3</button>
        <button class="btn-sum" onclick="press('+')">+</button>
        <button class="btn-eq" onclick="calculate()">=</button>

        <button class="btn-0" onclick="press('0')">0</button>
        <button class="btn-dot" onclick="press('.')">.</button>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');

    function press(value) {
        screen.value += value;
    }

    function clearScreen() {
        screen.value = '';
    }

    function backspace() {
        screen.value = screen.value.slice(0, -1);
    }

    function calculate() {
        try {
            let expression = screen.value;
            let result = eval(expression);
            
            if (result === undefined || isNaN(result)) {
                screen.value = "Error";
            } else {
                screen.value = Number(result.toFixed(6)); 
            }
        } catch (error) {
            screen.value = "Error";
        }
    }
</script>

</body>
</html>
