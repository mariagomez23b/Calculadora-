<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Transparente - Tulipanes en Movimiento</title>
    <style>
        /* Fondo base en un degradado rosa suave y romántico */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #ffb3c6 100%);
        }

        /* Canvas para la animación de los tulipanes flotantes */
        #tulip-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Contenedor transparente (Estilo Glassmorphism adaptado a tonos rosa) */
        .calculator {
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 10;
        }

        .screens-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .screen-group {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .screen-label {
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 2px;
            text-transform: lowercase;
            color: #ff4d6d;
        }

        .screen-title {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
        }

        .title-result { color: #2ecc71; }
        .title-a { color: #4a5568; }
        .title-b { color: #4a5568; }

        .display-box {
            background-color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            color: #2d3748;
            font-size: 22px;
            text-align: center;
            padding: 8px;
            box-sizing: border-box;
            outline: none;
            width: 100%;
            height: 45px;
            transition: all 0.3s ease;
        }

        .result-screen {
            font-size: 28px;
            height: 50px;
            color: #27ae60;
            border-color: rgba(46, 204, 113, 0.5);
            background-color: rgba(255, 255, 255, 0.7);
        }

        .display-box.active-screen {
            border-color: #ff4d6d;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 12px rgba(255, 77, 109, 0.4);
        }

        .inputs-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.05s, filter 0.15s, box-shadow 0.15s;
        }

        button:active { transform: scale(0.95); }
        button:hover { 
            filter: brightness(1.1); 
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.2);
        }

        /* Colores pastel combinando con la estética de tulipanes */
        .btn-red { background-color: #ff4d6d; border-color: #ff4d6d; }
        .btn-blue { background-color: #ff758f; border-color: #ff758f; }
        .btn-orange { background-color: #ff8fa3; border-color: #ff8fa3; }
        .btn-green { 
            background-color: #52b788; 
            grid-row: span 2; 
            height: 110px;
            border-color: #52b788;
        }
    </style>
</head>
<body>

<canvas id="tulip-bg"></canvas>

<div class="calculator">
    <div class="screens-container">
        <div class="screen-group">
            <div class="screen-label">screen-result</div>
            <div class="screen-title title-result">Resultado</div>
            <input type="text" id="screen-result" class="display-box result-screen" readonly placeholder="0">
        </div>

        <div class="inputs-row">
            <div class="screen-group" style="width: 35%;">
                <div class="screen-label" style="color: #ff758f;">screen-a</div>
                <div class="screen-title title-a">A</div>
                <input type="text" id="screen-a" class="display-box active-screen" readonly placeholder="" onclick="setTarget('a')">
            </div>

            <div class="screen-group" style="width: 26%;">
                <div class="screen-label" style="color: #ff8fa3;">op-selector</div>
                <input type="text" id="op-view" class="display-box" style="text-align: center; color: #ff4d6d;" readonly placeholder="?">
            </div>

            <div class="screen-group" style="width: 35%;">
                <div class="screen-label" style="color: #ff758f;">screen-b</div>
                <div class="screen-title title-b">B</div>
                <input type="text" id="screen-b" class="display-box" readonly placeholder="" onclick="setTarget('b')">
            </div>
        </div>
    </div>

    <div class="grid">
        <button class="btn-red" onclick="clearCalculator()">C</button>
        <button class="btn-red" onclick="backspace()">⌫</button>
        <button class="btn-orange" onclick="setOp('+')">+</button>
        <button class="btn-orange" onclick="setOp('/')">÷</button>

        <button class="btn-blue" onclick="press('7')">7</button>
        <button class="btn-blue" onclick="press('8')">8</button>
        <button class="btn-blue" onclick="press('9')">9</button>
        <button class="btn-orange" onclick="setOp('*')">×</button>

        <button class="btn-blue" onclick="press('4')">4</button>
        <button class="btn-blue" onclick="press('5')">5</button>
        <button class="btn-blue" onclick="press('6')">6</button>
        <button class="btn-orange" onclick="setOp('-')">−</button>

        <button class="btn-blue" onclick="press('1')">1</button>
        <button class="btn-blue" onclick="press('2')">2</button>
        <button class="btn-blue" onclick="press('3')">3</button>
        <button class="btn-green" onclick="calculate()">=</button>

        <button class="btn-red" onclick="clearCalculator()">C</button>
        <button class="btn-blue" onclick="press('0')">0</button>
        <button class="btn-orange" onclick="press('.')">.</button>
    </div>
</div>

<script>
    let currentTarget = 'a';
    let currentOperation = '';
    const screenA = document.getElementById('screen-a');
    const screenB = document.getElementById('screen-b');
    const screenResult = document.getElementById('screen-result');
    const opView = document.getElementById('op-view');

    function setTarget(target) {
        currentTarget = target;
        updateFocusStyles();
    }

    function updateFocusStyles() {
        if (currentTarget === 'a') {
            screenA.classList.add('active-screen');
            screenB.classList.remove('active-screen');
        } else {
            screenB.classList.add('active-screen');
            screenA.classList.remove('active-screen');
        }
    }

    function press(value) {
        if (currentTarget === 'a') {
            screenA.value += value;
        } else {
            screenB.value += value;
        }
    }

    function setOp(op) {
        currentOperation = op;
        let display = op;
        if (display === '/') display = '÷';
        if (display === '*') display = '×';
        opView.value = display;
        currentTarget = 'b';
        updateFocusStyles();
    }

    function clearCalculator() {
        screenA.value = '';
        screenB.value = '';
        screenResult.value = '';
        opView.value = '';
        currentTarget = 'a';
        updateFocusStyles();
    }

    function backspace() {
        let active = (currentTarget === 'a') ? screenA : screenB;
        active.value = active.value.slice(0, -1);
    }

    function calculate() {
        try {
            let valA = parseFloat(screenA.value);
            let valB = parseFloat(screenB.value);
            let op = currentOperation;
            let res = 0;
            if (isNaN(valA) || isNaN(valB) || !op) return;
            if (op === '+') res = valA + valB;
            if (op === '-') res = valA - valB;
            if (op === '*') res = valA * valB;
            if (op === '/') {
                if (valB === 0) { screenResult.value = "Error"; return; }
                res = valA / valB;
            }
            screenResult.value = Number(res.toFixed(6)).toString();
        } catch (e) {
            screenResult.value = "Error";
        }
    }

    // --- ANIMACIÓN INTERACTIVA DE TULIPANES ---
    const canvas = document.getElementById('tulip-bg');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Tulip {
        constructor() { this.reset(); this.y = Math.random() * canvas.height; }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + Math.random() * 100;
            this.size = Math.random() * 12 + 10; // Tamaño del tulipán
            this.speed = Math.random() * 1 + 0.5; // Velocidad de subida lenta
            this.swingSpeed = Math.random() * 0.02 + 0.01; // Balanceo lateral
            this.swingRange = Math.random() * 15 + 10;
            this.angle = Math.random() * Math.PI;
            // Tonos de rosa/rojo para los tulipanes individuales
            const colors = ['#ff4d6d', '#ff758f', '#ff8fa3', '#ffb3c6', '#fae0e4'];
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }
        update() {
            this.y -= this.speed;
            this.angle += this.swingSpeed;
            this.currentX = this.x + Math.sin(this.angle) * this.swingRange;
            if (this.y < -50) this.reset();
        }
        draw() {
            ctx.save();
            ctx.translate(this.currentX, this.y);
            
            // Tallo del tulipán (Verde suave)
            ctx.beginPath();
            ctx.strokeStyle = '#a3b18a';
            ctx.lineWidth = 2;
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(5, this.size, 2, this.size * 2.5);
            ctx.stroke();

            // Pequeña hoja verde
            ctx.beginPath();
            ctx.fillStyle = '#a3b18a';
            ctx.ellipse(3, this.size * 1.5, this.size * 0.3, this.size * 0.6, Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();

            // Capullo del Tulipán (Pétalos)
            ctx.fillStyle = this.color;
            ctx.globalAlpha = 0.85;

            // Pétalo izquierdo
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(-this.size * 0.7, -this.size * 0.2, -this.size * 0.5, -this.size);
            ctx.quadraticCurveTo(-this.size * 0.2, -this.size * 0.8, 0, 0);
            ctx.fill();

            // Pétalo derecho
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(this.size * 0.7, -this.size * 0.2, this.size * 0.5, -this.size);
            ctx.quadraticCurveTo(this.size * 0.2, -this.size * 0.8, 0, 0);
            ctx.fill();

            // Pétalo central principal
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(-this.size * 0.5, -this.size * 0.4, 0, -this.size * 1.1);
            ctx.quadraticCurveTo(this.size * 0.5, -this.size * 0.4, 0, 0);
            ctx.fill();

            ctx.restore();
        }
    }

    // Generar un grupo de 25 tulipanes flotantes
    const tulips = Array.from({ length: 25 }, () => new Tulip());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        tulips.forEach(t => { t.update(); t.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
</script>

</body>
</html>
